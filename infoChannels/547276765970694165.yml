    avatar: https://cdn.discordapp.com/avatars/1147223290784530513/f16a6ae6a4fbf4125fea9f985648d964.png
  embeds:
  - title: Moderation Policy
    description: |-
      We operate a 3 strikes policy. Rule violations (listed above) can trigger these actions.
      1. Strike one will result in an in channel warning stating which rule you violated
      2. Strike two will result in a timeout
      3. Strike three will result in a ban or read-only purgatory

      *Note that significant enough violations will lead to one or more of these steps being skipped.*
    color: "#D59C9C"
- content: |-
    Have a nice stay, and remember: if you feel like a member broke any of the rules please do not hesitate to contact moderators, either by pinging <@&1103212714219802654> or, by sending a message to <@1129791987680288798> if you feel more comfortable doing it that way.
    You can also report a message to moderators by right-clicking the message and then going to `Apps` > `Report`, which will open a ModMail thread with that message as context.

    P.S: here's an invite: <https://discord.neoforged.net>, and a backup one, just in case: <https://discord.gg/UvedJ9m>.
